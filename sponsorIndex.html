<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support StylePatch · 赞助</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f8f9fa;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 520px;
      width: 100%;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px 32px;
      text-align: center;
      transition: all 0.2s;
    }
    .icon { font-size: 48px; margin-bottom: 12px; }
    h1 { font-size: 24px; font-weight: 600; color: #1a1a1a; margin-bottom: 6px; }
    .sub { font-size: 15px; color: #5f6368; margin-bottom: 24px; line-height: 1.5; }
    .spinner {
      display: inline-block;
      width: 36px;
      height: 36px;
      border: 4px solid #e8eaed;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 8px 0 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .detect-msg { font-size: 14px; color: #3c4043; margin: 10px 0 20px; }
    .manual-title {
      font-size: 13px;
      color: #80868b;
      margin: 20px 0 12px;
      border-top: 1px solid #e8eaed;
      padding-top: 18px;
    }
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }
    .btn {
      display: inline-block;
      padding: 10px 22px;
      border-radius: 24px;
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
      transition: all 0.2s;
      border: 1px solid #dadce0;
      background: white;
      color: #1a73e8;
      min-width: 120px;
    }
    .btn:hover {
      background: #f1f3f4;
      border-color: #1a73e8;
      transform: translateY(-1px);
    }
    .btn.primary {
      background: #1a73e8;
      color: white;
      border-color: #1a73e8;
    }
    .btn.primary:hover {
      background: #1557b0;
      border-color: #1557b0;
    }
    .footer-note {
      margin-top: 24px;
      font-size: 12px;
      color: #9aa0a6;
      border-top: 1px solid #f1f3f4;
      padding-top: 16px;
    }
    @media (max-width: 480px) {
      .container { padding: 28px 20px; }
      .btn { min-width: 100px; padding: 8px 16px; font-size: 14px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="icon">🎨</div>
  <h1>StylePatch</h1>
  <div class="sub">
    <span>❤️ Support the Developer</span>
    <span style="margin:0 8px;">·</span>
    <span>❤️ 赞助开发者</span>
  </div>

  <!-- 检测动画 -->
  <div id="detectArea">
    <div class="spinner" id="spinner"></div>
    <div class="detect-msg" id="detectMsg">
      <span>Detecting your region, redirecting...</span><br>
      <span style="font-size:13px;color:#80868b;">正在检测您所在地区，即将跳转……</span>
    </div>
  </div>

  <!-- 手动选择（默认隐藏，检测失败或超时后显示） -->
  <div id="manualArea" style="display:none;">
    <div class="manual-title">— 手动选择 / Manual Selection —</div>
    <div class="btn-group">
      <a href="https://afdian.net/a/your_afdian_id" class="btn primary" target="_blank">🇨🇳 爱发电</a>
      <a href="https://ko-fi.com/your_kofi_id" class="btn" target="_blank">🌍 Ko-fi</a>
    </div>
    <div style="font-size:12px;color:#9aa0a6;margin-top:10px;">
      中国大陆用户请选爱发电 · Chinese mainland users choose Afdian
    </div>
  </div>

  <div class="footer-note">
    ⚡ All data processed locally · 所有数据仅在本地处理
  </div>
</div>

<script>
  (function() {
    const detectArea = document.getElementById('detectArea');
    const manualArea = document.getElementById('manualArea');

    // 请将以下链接替换为你的真实赞助地址
    const AFDIAN_URL = 'https://afdian.net/a/your_afdian_id';
    const KOFI_URL   = 'https://ko-fi.com/your_kofi_id';

    let isRedirected = false; // 标记是否已跳转

    function showManual() {
      if (!isRedirected) {
        detectArea.style.display = 'none';
        manualArea.style.display = 'block';
      }
    }

    // 使用 ip-api.com 的 JSONP 接口（对国内访问更友好）
    function tryRedirect() {
      const script = document.createElement('script');
      script.src = 'https://ip-api.com/json/?callback=handleIPInfo';
      document.body.appendChild(script);

      // 设置超时：延长至 8 秒
      setTimeout(() => {
        showManual();
      }, 8000);
    }

    // 全局回调函数
    window.handleIPInfo = function(data) {
      if (isRedirected) return;
      if (data && data.countryCode) {
        isRedirected = true;
        if (data.countryCode === 'CN') {
          window.location.href = AFDIAN_URL;
        } else {
          window.location.href = KOFI_URL;
        }
      } else {
        // 未获取到有效信息，显示手动选择
        showManual();
      }
    };

    // 开始检测
    tryRedirect();
  })();
</script>
</body>
</html>
